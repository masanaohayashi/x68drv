name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  swift-test:
    name: swift test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: X68Core tests
        run: swift test
      - name: Build app
        run: |
          xcodebuild \
            -project x68drv.xcodeproj \
            -scheme x68drv \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
